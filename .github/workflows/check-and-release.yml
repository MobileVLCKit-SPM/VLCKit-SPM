name: Check and Release VLCKit

on:
  workflow_dispatch:
    inputs:
      channel:
        description: prod or unstable
        required: true
        default: prod
      kit:
        description: VLCKit, MobileVLCKit, or TVVLCKit
        required: true
        default: VLCKit
      version:
        description: latest or exact upstream version
        required: true
        default: latest
      force:
        description: Rebuild even when metadata already matches
        required: true
        default: "false"
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: vlckit-spm-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'scheduled' }}
  cancel-in-progress: false

jobs:
  check-and-release:
    name: ${{ matrix.channel }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: prod
            kit: VLCKit
            version: latest
            force: "false"
          - channel: unstable
            kit: VLCKit
            version: latest
            force: "false"
    env:
      CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || matrix.channel }}
      KIT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.kit || matrix.kit }}
      VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || matrix.version }}
      FORCE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || matrix.force }}
    steps:
      - name: Check out repository
        if: github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure git author
        if: github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check out channel branch
        if: github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel
        run: |
          if git show-ref --verify --quiet "refs/remotes/origin/${CHANNEL}"; then
            git checkout -B "${CHANNEL}" "origin/${CHANNEL}"
            git merge --no-edit "$GITHUB_SHA"
          else
            git checkout -B "${CHANNEL}"
          fi

      - name: Build SwiftPM package asset
        if: github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel
        id: build
        run: |
          args=(
            build
            --channel "$CHANNEL"
            --kit "$KIT"
            --version "$VERSION"
            --repo "$GITHUB_REPOSITORY"
          )
          if [ "$FORCE" = "true" ]; then
            args+=(--force)
          fi
          python3 scripts/vlckit_spm.py "${args[@]}"

      - name: Stop when no new version exists
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed != 'true'
        run: echo "No new VLCKit version found."

      - name: Validate generated package
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        run: |
          unzip -l "${{ steps.build.outputs.asset_path }}" | head -30
          swift package dump-package

      - name: Commit generated package files
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        run: |
          git add Package.swift README.md "metadata/${CHANNEL}.json"
          if git diff --cached --quiet; then
            if [ "${{ steps.build.outputs.release_asset_exists }}" = "false" ]; then
              echo "No generated file changes; continuing to recreate the missing release asset."
              exit 0
            fi
            echo "No generated file changes to commit."
            exit 1
          fi
          git commit -m "Release ${KIT} ${{ steps.build.outputs.tag }}"

      - name: Push channel branch
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        run: |
          git push origin HEAD:${CHANNEL}

      - name: Create and push tag
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        run: |
          tag="${{ steps.build.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin; reusing it for the release."
            exit 0
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists locally; pushing it to origin."
          else
            git tag "$tag"
          fi
          git push origin "$tag"

      - name: Create or update GitHub release
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.build.outputs.tag }}
          ASSET: ${{ steps.build.outputs.asset_path }}
          NOTES: ${{ steps.build.outputs.release_notes }}
          PRERELEASE: ${{ steps.build.outputs.prerelease }}
        run: |
          flags=()
          if [ "$PRERELEASE" = "true" ]; then
            flags+=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
          else
            gh release create "$TAG" "$ASSET" \
              --title "$TAG" \
              --notes-file "$NOTES" \
              "${flags[@]}"
          fi

      - name: Verify uploaded release asset
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.build.outputs.tag }}
          ASSET_NAME: ${{ steps.build.outputs.asset_name }}
          ASSET_URL: ${{ steps.build.outputs.asset_url }}
        run: |
          for attempt in {1..12}; do
            if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET_NAME" >/dev/null; then
              echo "Release asset ${ASSET_NAME} is listed on ${TAG}."
              break
            fi
            if [ "$attempt" = "12" ]; then
              echo "Release asset ${ASSET_NAME} was not found on ${TAG}."
              exit 1
            fi
            echo "Waiting for release asset ${ASSET_NAME} to appear; attempt ${attempt}/12."
            sleep 5
          done
          curl --fail --location --head --retry 6 --retry-delay 5 "$ASSET_URL"

      - name: Verify final SwiftPM resolution
        if: (github.event_name == 'schedule' || matrix.channel == github.event.inputs.channel) && steps.build.outputs.changed == 'true'
        env:
          TAG: ${{ steps.build.outputs.tag }}
        run: |
          tmp="$(mktemp -d)"
          mkdir -p "$tmp/Consumer"
          cd "$tmp/Consumer"
          swift package init --type executable
          cat > Package.swift <<EOF
          // swift-tools-version: 5.9
          import PackageDescription

          let package = Package(
              name: "Consumer",
              dependencies: [
                  .package(url: "https://github.com/${GITHUB_REPOSITORY}.git", exact: "${TAG}")
              ],
              targets: [
                  .executableTarget(
                      name: "Consumer",
                      dependencies: [
                          .product(name: "${KIT}", package: "VLCKit-SPM")
                      ]
                  )
              ]
          )
          EOF
          swift package resolve
          cp "${GITHUB_WORKSPACE}/Package.swift" "$tmp/Package.swift"
          cd "$tmp"
          swift package dump-package
